
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;font-family:system-ui,sans-serif;}
.browser{display:flex;flex-direction:column;min-height:600px;background:#0d0d0d;color:#ddd;}
.titlebar{background:#1c1c1c;height:36px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid #2a2a2a;position:relative;}
.tl-wrap{display:flex;gap:7px;}
.tl{width:13px;height:13px;border-radius:50%;}
.title-mid{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;color:#777;white-space:nowrap;}
.tabbar{background:#161616;height:36px;display:flex;align-items:center;padding:0 8px;border-bottom:1px solid #252525;gap:3px;}
.tab{display:flex;align-items:center;gap:5px;background:#0d0d0d;padding:0 14px;height:28px;border-radius:6px 6px 0 0;font-size:12px;color:#ccc;cursor:pointer;}
.tab-x{color:#555;font-size:15px;margin-left:3px;}
.newtab-btn{color:#555;font-size:20px;padding:0 6px;cursor:pointer;background:none;border:none;}
.navbar{background:#1a1a1a;display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid #252525;}
.nb{background:none;border:none;color:#666;cursor:pointer;width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nb:hover{background:#2a2a2a;}

/* URL bar — flex row, icon sits INSIDE the row not absolute */
.urlbox{flex:1;display:flex;align-items:center;background:#111;border:1px solid #2e2e2e;border-radius:7px;height:28px;padding:0 8px;gap:5px;}
.urlbox input{flex:1;background:transparent;border:none;outline:none;font-size:12px;color:#aaa;min-width:0;}

.bookmarks{background:#151515;display:flex;align-items:center;gap:2px;padding:3px 10px;border-bottom:1px solid #222;}
.bm{display:flex;align-items:center;gap:4px;padding:2px 9px;border-radius:4px;font-size:12px;color:#888;cursor:pointer;text-decoration:none;}
.bm:hover{background:#252525;color:#ccc;}
.bm-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

.ntpage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0d0d;padding:40px 20px;}
.clock{font-size:96px;font-weight:200;color:#e5e5e5;letter-spacing:-4px;line-height:1;margin-bottom:8px;}
.datestr{font-size:13px;color:#555;margin-bottom:40px;}

/* Search bar — same flex row trick */
.searchbox{width:100%;max-width:400px;display:flex;align-items:center;background:#1a1a1a;border:1px solid #2e2e2e;border-radius:10px;height:42px;padding:0 14px;gap:8px;margin-bottom:28px;}
.searchbox input{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:#ccc;min-width:0;}
.searchbox input::placeholder{color:#555;}

.shortcuts{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;max-width:420px;}
.sc{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;text-decoration:none;}
.sc-icon{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;}
.sc:hover .sc-icon{transform:scale(1.08);}
.sc-label{font-size:11px;color:#666;}
.tagline{font-size:12px;color:#444;margin-top:24px;font-style:italic;}
.footer{background:#131313;border-top:1px solid #1e1e1e;padding:5px 14px;display:flex;justify-content:space-between;}
.footer span{font-size:11px;color:#3a3a3a;}
</style>

<div class="browser">
  <div class="titlebar">
    <div class="tl-wrap">
      <div class="tl" style="background:#ff5f56;"></div>
      <div class="tl" style="background:#ffbd2e;"></div>
      <div class="tl" style="background:#27c93f;"></div>
    </div>
    <div class="title-mid">NovaBrowser</div>
  </div>

  <div class="tabbar" id="tabbar">
    <div class="tab"><span>Yeni Sekme</span><span class="tab-x">×</span></div>
    <button class="newtab-btn" onclick="addTab()">+</button>
  </div>

  <div class="navbar">
    <button class="nb"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button class="nb"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button class="nb"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7A5 5 0 1 1 7 2a5 5 0 0 1 3.5 1.5L12 5" stroke="#666" stroke-width="1.5" stroke-linecap="round" fill="none"/><polyline points="12,2 12,5 9,5" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></button>
    <div class="urlbox">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" style="flex-shrink:0;">
        <rect x="1.5" y="4.5" width="8" height="6" rx="1.5" stroke="#555" stroke-width="1" fill="none"/>
        <path d="M3.5 4.5V3A2 2 0 0 1 7.5 3v1.5" stroke="#555" stroke-width="1" stroke-linecap="round" fill="none"/>
      </svg>
      <input id="urlbar" value="nova://newtab" />
    </div>
    <button class="nb"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="2.5" r="1.2" fill="#666"/><circle cx="7" cy="7" r="1.2" fill="#666"/><circle cx="7" cy="11.5" r="1.2" fill="#666"/></svg></button>
  </div>

  <div class="bookmarks">
    <a class="bm" href="https://youtube.com" target="_blank"><div class="bm-dot" style="background:#ff0000;"></div>YouTube</a>
    <a class="bm" href="https://github.com" target="_blank"><div class="bm-dot" style="background:#666;"></div>GitHub</a>
    <a class="bm" href="https://reddit.com" target="_blank"><div class="bm-dot" style="background:#ff4500;"></div>Reddit</a>
    <a class="bm" href="https://twitter.com" target="_blank"><div class="bm-dot" style="background:#1d9bf0;"></div>Twitter</a>
    <a class="bm" href="https://google.com" target="_blank"><div class="bm-dot" style="background:#4285f4;"></div>Google</a>
  </div>

  <div class="ntpage">
    <div class="clock" id="clock">--:--</div>
    <div class="datestr" id="datestr">yükleniyor...</div>

    <div class="searchbox">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="flex-shrink:0;">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="#555" stroke-width="1.5"/>
        <path d="M10.5 10.5L13 13" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchinput" placeholder="Google'da ara veya URL gir..." />
    </div>

    <div class="shortcuts">
      <a class="sc" href="https://youtube.com" target="_blank">
        <div class="sc-icon" style="background:#1e1e1e;border:1px solid #2a2a2a;">
          <svg width="32" height="32" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="#ff0000"/><polygon points="13,10 24,16 13,22" fill="white"/></svg>
        </div>
        <span class="sc-label">YouTube</span>
      </a>
      <a class="sc" href="https://github.com" target="_blank">
        <div class="sc-icon" style="background:#1e1e1e;border:1px solid #2a2a2a;">
          <svg width="30" height="30" viewBox="0 0 30 30"><path d="M15 3C8.37 3 3 8.37 3 15c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.65.24 2.87.12 3.17.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C23.57 24.8 27 20.3 27 15c0-6.63-5.37-12-12-12z" fill="white"/></svg>
        </div>
        <span class="sc-label">GitHub</span>
      </a>
      <a class="sc" href="https://reddit.com" target="_blank">
        <div class="sc-icon" style="background:#ff4500;border:1px solid #cc3700;">
          <svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="12" fill="#ff4500"/><circle cx="19.5" cy="8.5" r="2" fill="white"/><ellipse cx="14" cy="16" rx="5.5" ry="4" fill="white"/><circle cx="9.5" cy="12.5" rx="3" ry="2.8" fill="white"/><circle cx="18.5" cy="12.5" rx="3" ry="2.8" fill="white"/><circle cx="11.5" cy="16" r="1.2" fill="#ff4500"/><circle cx="16.5" cy="16" r="1.2" fill="#ff4500"/><path d="M11.5 19 Q14 21 16.5 19" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/></svg>
        </div>
        <span class="sc-label">Reddit</span>
      </a>
      <a class="sc" href="https://twitter.com" target="_blank">
        <div class="sc-icon" style="background:#1a1a1a;border:1px solid #2a2a2a;">
          <svg width="26" height="26" viewBox="0 0 26 26"><path d="M3 4h5l3.5 5 4-5h3.5l-5.5 7 6.5 9h-5l-4-5.5-4.5 5.5H3l6-7.5z" fill="white"/></svg>
        </div>
        <span class="sc-label">Twitter</span>
      </a>
      <a class="sc" href="https://twitch.tv" target="_blank">
        <div class="sc-icon" style="background:#9146ff;border:1px solid #7a32d4;">
          <svg width="28" height="28" viewBox="0 0 28 28"><rect x="4" y="2" width="20" height="20" rx="3" fill="white"/><rect x="18" y="20" width="5" height="5" rx="1.5" fill="white"/><rect x="5" y="20" width="5" height="5" rx="1.5" fill="white"/><rect x="10" y="8" width="3" height="8" rx="1.5" fill="#9146ff"/><rect x="15" y="8" width="3" height="8" rx="1.5" fill="#9146ff"/></svg>
        </div>
        <span class="sc-label">Twitch</span>
      </a>
    </div>
    <div class="tagline" id="tagline">Stack Overflow seni bekliyor...</div>
  </div>

  <div class="footer">
    <span>Nova Browser — Vedat Daşcı tarafından yapılmıştır</span>
    <span id="footertime"></span>
  </div>
</div>

<script>
(function(){
  var MO=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  var DA=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  var TG=['Stack Overflow seni bekliyor...','Bugün ne build edeceksin?','404: Motivasyon bulunamadı.','git commit -m "finally works"','Kodu yaz, dünyayı değiştir.'];
  var ti=0;
  function tick(){
    var n=new Date();
    document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    document.getElementById('footertime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    document.getElementById('datestr').textContent=n.getDate()+' '+MO[n.getMonth()]+' '+n.getFullYear()+' '+DA[n.getDay()];
  }
  tick();
  setInterval(tick,1000);
  setInterval(function(){ti=(ti+1)%TG.length;document.getElementById('tagline').textContent=TG[ti];},4000);
  document.getElementById('searchinput').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&this.value.trim()){window.open('https://google.com/search?q='+encodeURIComponent(this.value.trim()),'_blank');}
  });
})();
function addTab(){
  var bar=document.getElementById('tabbar');
  var btn=bar.querySelector('.newtab-btn');
  var t=document.createElement('div');
  t.className='tab';
  t.innerHTML='<span>Yeni Sekme</span><span class="tab-x" onclick="this.parentNode.remove()">×</span>';
  bar.insertBefore(t,btn);
}
</script>
